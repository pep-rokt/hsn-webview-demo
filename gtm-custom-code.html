<!--
  ============================================================
  Rokt Web SDK Integration — GTM Custom HTML Tag
  ============================================================

  HOW TO USE:
  1. Open Google Tag Manager (https://tagmanager.google.com)
  2. Select container GTM-MPN4J78
  3. Create a new Tag → Custom HTML
  4. Copy everything below (including the <script> tags) and paste it
     as the tag content
  5. Set the trigger to fire on "All Pages" (or your desired trigger)
  6. Save and Publish the container

  WHAT THIS DOES:
  - Loads the Rokt Web SDK via the mParticle ecommerce integration pattern
  - Calls selectPlacements() with test attributes to render a Rokt placement
  - Intercepts link clicks via overrideLinkNavigation / LINK_NAVIGATION_REQUEST
  - Forwards clicked URLs to the native iOS app via webkit messageHandlers
  - Falls back to window.open() when running outside a WKWebView (e.g. browser testing)

  CONFIGURATION:
  - API Key: [redacted]
  - Development Mode: ON (set isDevelopmentMode to false for production)
  - overrideLinkNavigation: ON
  ============================================================
-->

<script>
  // -------------------------------------------------------
  // 1. Configuration
  // -------------------------------------------------------
  var API_KEY = '[redacted]'
  var ROKT_DOMAIN = 'https://apps.rokt-api.com';

  // -------------------------------------------------------
  // 2. mParticle / Rokt SDK config (must be set BEFORE the SDK loads)
  // -------------------------------------------------------
  window.mParticle = {
    config: {
      isDevelopmentMode: true,
      identifyRequest: {
        userIdentities: {
          email: 'test@example.com'
        }
      },
      launcherOptions: {
        overrideLinkNavigation: true
      }
    }
  };

  // -------------------------------------------------------
  // 3. SDK loader — scaffolds window.mParticle and loads app.js
  // -------------------------------------------------------
  (function (e) {
    window.mParticle = window.mParticle || {};
    window.mParticle.EventType = {
      Unknown: 0, Navigation: 1, Location: 2, Search: 3,
      Transaction: 4, UserContent: 5, UserPreference: 6,
      Social: 7, Other: 8, Media: 9
    };
    window.mParticle.eCommerce = { Cart: {} };
    window.mParticle.Identity = {};
    window.mParticle.Rokt = {};
    window.mParticle.config = window.mParticle.config || {};
    window.mParticle.config.rq = [];
    window.mParticle.config.snippetVersion = 2.8;
    window.mParticle.ready = function (f) {
      window.mParticle.config.rq.push(f);
    };

    var mp = ["endSession", "logError", "logBaseEvent", "logEvent", "logForm",
      "logLink", "logPageView", "setSessionAttribute", "setAppName", "setAppVersion",
      "setOptOut", "setPosition", "startNewSession", "startTrackingLocation",
      "stopTrackingLocation"];
    mp.forEach(function (method) {
      window.mParticle[method] = function () {
        // queued until SDK is loaded
      };
    });

    var t = window.mParticle.config.isDevelopmentMode ? 1 : 0;
    var n = '?env=' + t;
    var c = document.createElement('script');
    c.type = 'text/javascript';
    c.async = true;
    window.ROKT_DOMAIN = ROKT_DOMAIN || 'https://apps.rokt-api.com';
    mParticle.config.domain = ROKT_DOMAIN.split('//')[1];
    c.src = ROKT_DOMAIN + '/js/v2/' + e + '/app.js' + n;
    var l = document.getElementsByTagName('script')[0];
    l.parentNode.insertBefore(c, l);
  })(API_KEY);

  // -------------------------------------------------------
  // 4. When SDK is ready: select placements & handle link navigation
  // -------------------------------------------------------
  window.mParticle.ready(function () {
    // Select placements with test attributes
    var selectionPromise = window.mParticle.Rokt.selectPlacements({
      attributes: {
        email: 'test@example.com',
        firstname: 'Test',
        lastname: 'User',
        confirmationref: 'HSN-2024-00831',
        billingzipcode: '90210',
        amount: '43.49'
      }
    });

    // Handle the selection (may be a Promise or direct object)
    Promise.resolve(selectionPromise).then(function (selection) {
      if (selection && typeof selection.on === 'function') {
        selection.on('LINK_NAVIGATION_REQUEST').subscribe(function (event) {
          // Extract URL from the event (handle both payload shapes)
          var url = (event.body && event.body.url) || event.url;

          if (!url) {
            console.warn('[Rokt GTM] LINK_NAVIGATION_REQUEST received but no URL found', event);
            return;
          }

          // Forward to native iOS app via WKWebView message handler
          if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.roktMessageHandler) {
            window.webkit.messageHandlers.roktMessageHandler.postMessage(url);
          } else {
            // Fallback: open in a new tab/window (for browser testing)
            window.open(url);
          }
        });
      }
    }).catch(function (err) {
      console.error('[Rokt GTM] Error during selectPlacements:', err);
    });
  });
</script>
